<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uyg'unlik — Moslik ilovasi</title>
    <style>
      /* Asosiy sozlamalar */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --primary: #8b5cf6;
        --secondary: #10b981;
        --accent: #ffca28;
        --text-light: #ffffff;
        --glass: rgba(255, 255, 255, 0.12);
        --glass-border: rgba(255, 255, 255, 0.25);
      }

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(
          135deg,
          #0f172a 0%,
          #1e1b4b 50%,
          #312e81 100%
        );
        color: var(--text-light);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        overflow-x: hidden;
      }

      .glow {
        position: fixed;
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(139, 92, 246, 0.3) 0%,
          transparent 70%
        );
        border-radius: 50%;
        z-index: -1;
        filter: blur(50px);
        animation: float 15s infinite alternate;
      }

      @keyframes float {
        0% {
          transform: translate(-10%, -10%);
        }
        100% {
          transform: translate(100%, 80%);
        }
      }

      #app {
        width: 100%;
        max-width: 440px;
      }

      .screen {
        display: none;
        animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .screen.active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card {
        background: var(--glass);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        padding: 2rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .logo-area {
        text-align: center;
        margin-bottom: 2rem;
      }
      .app-name {
        font-size: 34px;
        font-weight: 800;
        background: linear-gradient(to right, #a78bfa, #f472b6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .input-group {
        margin-bottom: 1.5rem;
      }
      .input-label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        color: #a5b4fc;
        margin-bottom: 8px;
        display: block;
        letter-spacing: 1px;
      }

      .custom-input {
        width: 100%;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 15px;
        color: white;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
      }

      .custom-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
      }

      .btn-main {
        width: 100%;
        background: white;
        color: #1e1b4b;
        border: none;
        border-radius: 16px;
        padding: 18px;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn-main:hover {
        transform: scale(1.02);
        background: #f3f4f6;
      }

      .q-text {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 2rem;
        line-height: 1.4;
        color: #fff;
      }

      .answer-btn {
        width: 100%;
        text-align: left;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        border-radius: 18px;
        padding: 18px;
        margin-bottom: 12px;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.9);
        font-size: 16px;
        transition: all 0.2s;
      }

      .answer-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: #fff;
      }
      .answer-btn.selected {
        background: var(--primary) !important;
        color: white !important;
        border-color: white !important;
        font-weight: 700;
        transform: scale(0.97);
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
      }

      .progress-container {
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        margin-bottom: 2rem;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #8b5cf6, #ec4899);
        transition: width 0.4s;
      }

      .trait-bar-bg {
        height: 8px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        flex: 1;
        overflow: hidden;
      }
      .trait-bar-fill {
        height: 100%;
        border-radius: 10px;
        transition: width 1s ease-out;
      }
      .trait-item {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 12px;
      }
      .trait-name {
        width: 90px;
        font-size: 12px;
        font-weight: 600;
        color: #cbd5e1;
      }

      .score-circle {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        border: 5px solid var(--secondary);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        font-size: 28px;
        font-weight: 800;
        background: rgba(16, 185, 129, 0.1);
        box-shadow: 0 0 25px rgba(16, 185, 129, 0.2);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>

    <div id="app">
      <div class="screen active" id="s-welcome">
        <div class="logo-area">
          <div style="font-size: 50px; margin-bottom: 10px">✨</div>
          <div class="app-name">Uyg'unlik</div>
          <p style="opacity: 0.6; font-size: 14px">AI-Psixolog tahlili</p>
        </div>
        <div class="card">
          <div class="input-group">
            <label class="input-label">Ismingiz</label>
            <input
              id="input-top"
              class="custom-input"
              type="text"
              placeholder="Ismingizni yozing"
            />
          </div>
          <div class="input-group">
            <label class="input-label">Uning ismi</label>
            <input
              id="input-bottom"
              class="custom-input"
              type="text"
              placeholder="Sherik ismini yozing"
            />
          </div>
          <button class="btn-main" onclick="startQuiz()">
            Tahlilni boshlash →
          </button>
        </div>
      </div>

      <div class="screen" id="s-quiz">
        <div class="progress-container">
          <div class="progress-bar" id="progress-fill"></div>
        </div>
        <div
          id="q-step"
          style="
            font-size: 12px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
          "
        ></div>
        <div class="q-text" id="q-text"></div>
        <div id="answers-wrap"></div>
      </div>

      <div class="screen" id="s-thinking">
        <div class="card" style="text-align: center; padding: 4rem 2rem">
          <div
            style="
              width: 45px;
              height: 45px;
              border: 4px solid rgba(255, 255, 255, 0.1);
              border-top-color: var(--primary);
              border-radius: 50%;
              animation: spin 0.8s linear infinite;
              margin: 0 auto 1.5rem;
            "
          ></div>
          <p style="font-weight: 600">AI ma'lumotlarni o'rganmoqda...</p>
        </div>
      </div>

      <div class="screen" id="s-result">
        <div class="card" style="text-align: center; margin-bottom: 1.5rem">
          <div class="score-circle" id="score-num">0%</div>
          <h2
            id="result-names"
            style="font-size: 22px; margin-bottom: 8px"
          ></h2>
          <div id="verdict-wrap"></div>
        </div>

        <div class="card" style="margin-bottom: 1.5rem">
          <h4
            style="
              font-size: 12px;
              color: var(--accent);
              margin-bottom: 15px;
              letter-spacing: 1px;
            "
          >
            XARAKTERLAR MOSLIGI
          </h4>
          <div id="traits-wrap"></div>
        </div>

        <div class="card" style="margin-bottom: 1.5rem">
          <h4
            style="
              font-size: 12px;
              color: var(--accent);
              margin-bottom: 10px;
              letter-spacing: 1px;
            "
          >
            AI XULOSASI
          </h4>
          <p
            id="ai-text"
            style="font-size: 15px; line-height: 1.6; color: #e2e8f0"
          ></p>
        </div>

        <button
          class="btn-main"
          onclick="location.reload()"
          style="
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--glass-border);
          "
        >
          🔄 Qayta urinish
        </button>
      </div>
    </div>

    <script>
      // API KEY bo'sh qoldiriladi, muhit tomonidan ta'minlanadi
      const API_KEY = "AIzaSyBTdIx_UHjDUkk9-JxFcE01KW94lS7c4BY";
      let userName = "",
        partnerName = "",
        currentQ = 0,
        answers = [];

      const questions = [
        {
          text: "Hayotiy tanlovlar oldida qolganda, siz uchun eng asosiy mezon nima?",
          options: [
            { label: "Yaqinlarimning xotirjamligi va baxti", val: "oila" },
            { label: "O'z ustimda ishlash va ichki o'sish", val: "shaxsiy" },
            {
              label: "Jamiyatdagi o'rnim va moddiy yutuqlar",
              val: "ambitsiya",
            },
            {
              label: "Chegarasiz erkinlik va yangi sarguzashtlar",
              val: "erkinlik",
            },
          ],
        },
        {
          text: "Munosabatlarda yuzaga keladigan tushunmovchiliklarni qanday bartaraf etasiz?",
          options: [
            {
              label: "His-tuyg'ularni ochiq muhokama qilish orqali",
              val: "murosa",
            },
            {
              label:
                "Biroz tanaffus qilib, vaziyatni sovuqqonlik bilan o'ylash",
              val: "barqaror",
            },
            {
              label: "O'z pozitsiyamni qat'iy himoya qilish orqali",
              val: "ambitsiya",
            },
            {
              label: "Murosa yo'lini qidirish va vaziyatni yumshatish",
              val: "murosa",
            },
          ],
        },
        {
          text: "Muvaffaqiyatli shaxs siz uchun kim?",
          options: [
            { label: "Barkamol va baxtli oila boshlig'i", val: "oila" },
            {
              label: "O'z sohasining eng cho'qqisiga chiqqan mutaxassis",
              val: "ambitsiya",
            },
            {
              label: "Dunyo bo'ylab sayohat qiladigan erkin inson",
              val: "erkinlik",
            },
            { label: "Doimiy izlanishda bo'lgan faylasuf", val: "shaxsiy" },
          ],
        },
        {
          text: "Moliyaviy masalalarda qanday strategiyaga tayanishingiz kerak?",
          options: [
            { label: "Kelajak uchun qat'iy tejamkorlik", val: "barqaror" },
            { label: "O'zaro kelishilgan holda umumiy boshqaruv", val: "oila" },
            {
              label: "Har bir tomon o'z mustaqil byudjetiga ega bo'lishi",
              val: "erkinlik",
            },
            { label: "Vaziyatga qarab o'zgaruvchan yondashuv", val: "murosa" },
          ],
        },
        {
          text: "Stressli vaziyatlarda sizga nima eng ko'p kuch beradi?",
          options: [
            { label: "Yaqin insonimning daldasi va quchog'i", val: "oila" },
            { label: "Yolg'izlikda o'y-xayollar bilan qolish", val: "shaxsiy" },
            {
              label: "Sevimli mashg'ulot yoki ijod bilan shug'ullanish",
              val: "erkinlik",
            },
            { label: "Do'stlar davrasida faol muloqot", val: "oila" },
          ],
        },
        {
          text: "Kutilmagan muammolarni qanday hal qilasiz?",
          options: [
            { label: "Mantiqiy tahlil va reja asosida", val: "barqaror" },
            {
              label: "Intuitsiya va ichki hissiyotga tayanib",
              val: "erkinlik",
            },
            { label: "Tajribali insonlardan maslahat so'rab", val: "oila" },
            { label: "Boshqalar bilan mas'uliyatni bo'lishib", val: "murosa" },
          ],
        },
        {
          text: "Siz uchun eng mukammal hordiq kuni qanday o'tadi?",
          options: [
            { label: "Tabiat qo'ynida, sokinlikda", val: "erkinlik" },
            { label: "Yangi bilim yoki hunar o'rganish bilan", val: "shaxsiy" },
            { label: "Katta va shovqinli davrada", val: "oila" },
            { label: "Uyda, yaqinlar davrasida shinamlikda", val: "oila" },
          ],
        },
        {
          text: "Kelajakda o'zingizni qayerda va qanday holatda tasavvur qilasiz?",
          options: [
            {
              label: "Nufuzli lavozim va yuksak natijalar bilan",
              val: "ambitsiya",
            },
            { label: "Katta va ahil oila davrasida", val: "oila" },
            {
              label: "Turli mamlakatlarda sarguzashtlar ichida",
              val: "erkinlik",
            },
            {
              label: "O'z sohasida tan olingan ekspert sifatida",
              val: "shaxsiy",
            },
          ],
        },
        {
          text: "Bilim olishning qaysi usuli siz uchun samaraliroq?",
          options: [
            {
              label: "Kitoblar va ilmiy manbalar orqali mustaqil",
              val: "shaxsiy",
            },
            { label: "Amaliyot va shaxsiy tajribalar orqali", val: "erkinlik" },
            { label: "Seminar va treninglarda guruh bilan", val: "oila" },
            { label: "Ustoz-shogird an'anasi asosida", val: "oila" },
          ],
        },
        {
          text: "Yangi tanishuvlarda sizni birinchi navbatda nima jalb qiladi?",
          options: [
            { label: "Insonning samimiyligi va ishonchliligi", val: "oila" },
            { label: "Uning dunyoqarashi va intellekti", val: "shaxsiy" },
            { label: "Faolligi va hayotga bo'lgan ishtiyoqi", val: "erkinlik" },
            { label: "Yutuqlari va maqsadlari", val: "ambitsiya" },
          ],
        },
        {
          text: "Sizningcha, ideal munosabatlar asosi nima?",
          options: [
            { label: "Cheksiz sadoqat va g'amxo'rlik", val: "oila" },
            {
              label: "Shaxsiy hududni va erkinlikni hurmat qilish",
              val: "erkinlik",
            },
            {
              label: "Umumiy manfaatlar va birgalikdagi rivojlanish",
              val: "barqaror",
            },
            { label: "Doimiy hayajon va yangi hislar", val: "erkinlik" },
          ],
        },
        {
          text: "O'z hayotingizdagi o'zgarishlarga qanday munosabatda bo'lasiz?",
          options: [
            {
              label: "Ehtiyotkorlik bilan, xavfsizlikni o'ylab",
              val: "barqaror",
            },
            {
              label: "Ochiq ko'ngil bilan, imkoniyat sifatida",
              val: "erkinlik",
            },
            { label: "Tahlil qilib, foyda-zararini o'ylab", val: "ambitsiya" },
            { label: "Hissiyotlarga berilib, biroz qiynalib", val: "murosa" },
          ],
        },
        {
          text: "Xato qilganingizda o'zingizni qanday tutasiz?",
          options: [
            { label: "Xatoni tan olib, dars chiqaraman", val: "shaxsiy" },
            {
              label: "Vaziyatni tuzatish uchun tezkor choralar ko'raman",
              val: "ambitsiya",
            },
            { label: "Yaqinlarimdan yordam va dalda so'rayman", val: "oila" },
            {
              label: "Vaziyatni biroz unutishga harakat qilaman",
              val: "barqaror",
            },
          ],
        },
        {
          text: "Ijtimoiy tarmoqlar hayotingizda qanday o'rin tutadi?",
          options: [
            { label: "Muloqot va yaqinlar bilan aloqa vositasi", val: "oila" },
            {
              label: "O'z-o'zini rivojlantirish va axborot manbai",
              val: "shaxsiy",
            },
            { label: "Ish va biznes quroli", val: "ambitsiya" },
            { label: "Vaqt o'tkazish va ko'ngilochar vosita", val: "erkinlik" },
          ],
        },
        {
          text: "Siz uchun 'baxt' tushunchasi nimadan iborat?",
          options: [
            { label: "Yaqinlarimning sog'-salomatligi", val: "oila" },
            { label: "Ichki xotirjamlik va o'zlikni topish", val: "shaxsiy" },
            {
              label: "Maqsadlarga erishish va g'alaba nashidasi",
              val: "ambitsiya",
            },
            { label: "Hech kimga qaram bo'lmaslik", val: "erkinlik" },
          ],
        },
      ];

      function showScreen(id) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
      }

      function startQuiz() {
        userName =
          document.getElementById("input-top").value.trim() ||
          "Foydalanuvchi 1";
        partnerName =
          document.getElementById("input-bottom").value.trim() ||
          "Foydalanuvchi 2";
        currentQ = 0;
        answers = [];
        showScreen("s-quiz");
        renderQuestion();
      }

      function renderQuestion() {
        const q = questions[currentQ];
        document.getElementById("progress-fill").style.width =
          ((currentQ + 1) / questions.length) * 100 + "%";
        document.getElementById("q-step").textContent =
          `Savol ${currentQ + 1} / ${questions.length}`;
        document.getElementById("q-text").textContent = q.text;
        const wrap = document.getElementById("answers-wrap");
        wrap.innerHTML = "";

        q.options.forEach((opt) => {
          const btn = document.createElement("button");
          btn.className = "answer-btn";
          btn.textContent = opt.label;
          btn.onclick = () => {
            const allBtns = wrap.querySelectorAll(".answer-btn");
            allBtns.forEach((b) => b.classList.remove("selected"));
            btn.classList.add("selected");

            setTimeout(() => {
              answers.push(opt.val);
              currentQ++;
              if (currentQ < questions.length) renderQuestion();
              else processResult();
            }, 300);
          };
          wrap.appendChild(btn);
        });
      }

      function computeTraits() {
        const t = { oila: 20, ambitsiya: 20, barqaror: 20, erkinlik: 20 };
        answers.forEach((v) => {
          if (t[v] !== undefined) t[v] += 5;
          else if (v === "shaxsiy")
            t.erkinlik += 5; // Shaxsiy rivojlanish erkinlikka yaqin
          else if (v === "murosa") t.oila += 5; // Murosa oilaviy qadriyatga yaqin
        });
        Object.keys(t).forEach((k) => (t[k] = Math.min(100, t[k])));
        return t;
      }

      async function processResult() {
        showScreen("s-thinking");
        const traits = computeTraits();

        // Xatolikni oldini olish uchun xavfsiz map funksiyasi
        const details = answers
          .map((val, i) => {
            const question = questions[i];
            const option = question.options.find((o) => o.val === val);
            const label = option ? option.label : "Tanlanmagan";
            return `S: ${question.text} | J: ${label}`;
          })
          .join("\n");

        const prompt = `Foydalanuvchilar: ${userName} va ${partnerName}. 
        Ushbu javoblar asosida ularning mosligini tahlil qil.
        FAQAT JSON qaytar: {"score": 85, "verdict": "Ajoyib", "analysis": "Qisqa tahlil"}`;

        try {
          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
              }),
            },
          );

          const result = await response.json();
          const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "";

          // JSONni tozalash (Markdown bloklarini olib tashlash)
          const jsonStr = text.replace(/```json|```/g, "").trim();
          const aiRes = JSON.parse(jsonStr);

          showFinal(aiRes, traits);
        } catch (e) {
          console.error("AI Error:", e);
          // Fallback natija
          showFinal(
            {
              score: 75,
              verdict: "Yaxshi moslik",
              analysis:
                "Sizning dunyoqarashingiz ko'p jihatdan bir-biriga mos keladi. Kichik tushunmovchiliklarni muloqot orqali hal qilish mumkin.",
            },
            traits,
          );
        }
      }

      function showFinal(ai, traits) {
        document.getElementById("score-num").textContent = ai.score + "%";
        document.getElementById("result-names").textContent =
          `${userName} + ${partnerName}`;
        document.getElementById("ai-text").textContent = ai.analysis;
        document.getElementById("verdict-wrap").innerHTML =
          `<span style="background:var(--secondary); color:white; padding:6px 18px; border-radius:20px; font-size:13px; font-weight:700;">${ai.verdict}</span>`;

        const tData = [
          { l: "Oilaparastlik", v: traits.oila, c: "#8b5cf6" },
          { l: "Ambitsiya", v: traits.ambitsiya, c: "#f43f5e" },
          { l: "Barqarorlik", v: traits.barqaror, c: "#10b981" },
          { l: "Erkinlik", v: traits.erkinlik, c: "#0ea5e9" },
        ];

        document.getElementById("traits-wrap").innerHTML = tData
          .map(
            (t) => `
          <div class="trait-item">
            <span class="trait-name">${t.l}</span>
            <div class="trait-bar-bg"><div class="trait-bar-fill" style="width:${t.v}%; background:${t.c}"></div></div>
            <span style="font-size:12px; font-weight:700; width:30px;">${t.v}%</span>
          </div>`,
          )
          .join("");

        showScreen("s-result");
      }
    </script>
  </body>
</html>
